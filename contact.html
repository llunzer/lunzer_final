<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>North Star Resort</title>
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        <meta name="author" content="Luke Lunzer">
        <meta name="description" content="Ski Resort Website">

       <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Rye&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="styles.css">
    </head>
    <body class="contact-page">
        <div class="site-wrapper">

<header class="hero">

    <h1 class="main-title">North Star Resort</h1>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="#accommodations">Accommodations</a>
      <a href="#">Contact</a>
    </nav>
</header>

<section class="contact-container">
  
    <div class="contact-column left-column">
      <h2>Contact Us</h2>
      <p>
        Please reach out to us with any questions or concerns. We are happy to help you plan your dream vacation with us!<br>
        Required fields marked with a *
      </p>
      <img src="images/swiss-peak.jpg" alt="Contact Image">
    </div>

    <div class="contact-column right-column">

      <div id="form">
        <form action="https://wp.zybooks.com/form-viewer.php" method="POST" target="_blank">
          <label for="my-name">Full Name*</label>
          <input type="text" name="my-name" id="my-name" required>

          <label for="my-email">Email Address*</label>
          <input type="email" name="my-email" id="my-email" required>

          <label for="my-phone">Phone*</label>
          <input type="tel" name="my-phone" id="my-phone" required>

          <fieldset>
            <legend>Preferred Method of Contact</legend>
            <input type="radio" name="contact-pref" id="pref-email" checked>
            <label for="pref-email">Email</label>

            <input type="radio" name="contact-pref" id="pref-phone" required>
            <label for="pref-phone">Phone</label>
          </fieldset>

          <label for="my-comments">Comments</label>
          <textarea name="my-comments" id="my-comments"></textarea>

          <input type="submit" name="my-submit" id="my-submit" value="Submit">
        </form>
      </div>
    </div>

  </section>


     <footer class="footer">
    <p>Copyright ©2026 - North Star Resort</p>
     </footer>

  </div>
</body>
</html>
